services:
  lumivision:
    image: ghcr.io/bradqui/lumivision:latest
    container_name: ${LUMIVISION_CONTAINER_NAME:-lumivision}
    restart: unless-stopped
    ports:
      - "${LUMIVISION_HOST_PORT:-8018}:8000"
    volumes:
      - ./data:/data
    environment:
      # All values come from .env — copy .env.example to .env and edit it.
      LUMIVISION_ADMIN_USER: ${LUMIVISION_ADMIN_USER:-admin}
      LUMIVISION_ADMIN_PASSWORD: ${LUMIVISION_ADMIN_PASSWORD:?set LUMIVISION_ADMIN_PASSWORD in .env}
      LUMIVISION_ADMIN_EMAIL: ${LUMIVISION_ADMIN_EMAIL:-}
      LUMIVISION_ALLOWED_HOSTS: ${LUMIVISION_ALLOWED_HOSTS:-*}
      LUMIVISION_TRUSTED_ORIGINS: ${LUMIVISION_TRUSTED_ORIGINS:-}
      LUMIVISION_MAX_UPLOAD_MB: ${LUMIVISION_MAX_UPLOAD_MB:-250}
      LUMIVISION_TIME_ZONE: ${LUMIVISION_TIME_ZONE:-UTC}
      LUMIVISION_WORKERS: ${LUMIVISION_WORKERS:-3}
