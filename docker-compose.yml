services:
  lumivision:
    build: .
    image: lumivision:latest
    container_name: lumivision
    restart: unless-stopped
    ports:
      - "8380:8000"
    volumes:
      - ./data:/data
    environment:
      # First-run admin account (change the password after first login!)
      LUMIVISION_ADMIN_USER: admin
      LUMIVISION_ADMIN_PASSWORD: change-me-now
      LUMIVISION_ADMIN_EMAIL: ""
      # Your public hostname(s), comma-separated
      LUMIVISION_ALLOWED_HOSTS: "*"
      # Required when served over HTTPS through the Virtualmin proxy,
      # e.g. https://vision.example.com
      LUMIVISION_TRUSTED_ORIGINS: ""
      # Optional tuning
      LUMIVISION_MAX_UPLOAD_MB: "250"
      LUMIVISION_TIME_ZONE: "America/New_York"
